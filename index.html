<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine?</title>
    <style>
        /* Base styles from our previous versions, but with additions */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Important! Prevents scrollbars. */
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ffeef2, #ffccd5);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            position: relative; /* Position context for initial non-absolute placement */
        }

        h1 {
            color: #d6336c;
            font-size: 3rem;
            margin-bottom: 30px;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background-color: #4caf50;
            color: white;
            transition: all 0.2s ease-in-out; /* Add smooth transition */
        }

        /* Continuous Pulse Animation on Hover */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(76, 175, 80, 0.5); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(76, 175, 80, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(76, 175, 80, 0.5); }
        }

        #yesBtn:hover {
            animation: pulse 1s infinite;
        }

        #noBtn {
            background-color: #f44336;
            color: white;
            position: relative; /* Start non-absolute for layout */
            transition: 0.1s; /* Fast movement */
        }

        /* Success screen overlay (initially hidden) */
        #successScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 238, 242, 0.95);
            color: #d6336c;
            font-size: 4rem;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .success-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Add dynamic bouncing hearts and text */
        .bounce-heart {
            font-size: 8rem;
            animation: bounce-in 1.5s ease infinite alternate;
        }

        @keyframes bounce-in {
            0% { transform: scale(1) translateY(0px); }
            100% { transform: scale(1.1) translateY(-20px); }
        }

    </style>
</head>
<body>

    <div id="originalContent" class="container">
        <h1>Will you be my Valentine?</h1>
        <div style="display: flex; gap: 20px;">
            <button id="yesBtn" onclick="accept()">Yes!</button>
            <button id="noBtn" onmouseover="startEvasion(this)">No</button>
        </div>
    </div>

    <!-- Hidden Success Overlay -->
    <div id="successScreen">
        <div class="success-content">
            <div class="bounce-heart">❤️💖🥰</div>
            Yay! You said Yes!
        </div>
    </div>

    <script>
        let evasionActive = false; // Tracks if the no button has started its magic trick

        function startEvasion(button) {
            if (!evasionActive) {
                // Change the button's behavior from fixed flow to relative positioning first
                button.style.position = 'absolute';
                evasionActive = true;
            }
            
            // Standard move function, but now it only applies *after* evasion is activated
            moveButton(button);
        }

        function moveButton(noBtn) {
            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;
            
            // Generate random but bounded positions
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        function accept() {
            // Hide the original question and button layout
            document.getElementById('originalContent').style.display = 'none';
            // Show the celebratory "success screen" overlay with a flex display
            document.getElementById('successScreen').style.display = 'flex';
        }
    </script>
</body>
</html>
